[package]
authors =["Damien Bataille <dbataille@nvidia.com>"]
title = "NVIDIA RTX Remix control for the StageCraft"
description = "Control will connect back end and front end for NVIDIA RTX Remix StageCraft App"
version = "1.8.1"
readme = "docs/README.md"
repository = "https://gitlab-master.nvidia.com/lightspeedrtx/lightspeed-kit/-/tree/main/source/extensions/lightspeed.trex.control.stagecraft"
category = "internal"
keywords = [ "remix",]
changelog = "docs/CHANGELOG.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"lightspeed.event.shutdown_base" = {}
"lightspeed.event.events" = {}
"lightspeed.events_manager" = {}
"lightspeed.hydra.remix.core" = {optional=true}  # optional: heavy-capture safe mode pushes renderer config through it (absent in headless/CLI apps)
"lightspeed.layer_manager.core" = {}
"lightspeed.trex.capture.core.shared" = {}
"lightspeed.trex.contexts" = {}
"lightspeed.trex.menu.workfile" = {}
"lightspeed.trex.hotkeys" = {}
"lightspeed.trex.project_wizard.window" = {}
"lightspeed.trex.replacement.core.shared" = {}
"lightspeed.trex.stage.core.shared" = {}
"lightspeed.trex.utils.widget" = {}
"lightspeed.trex.stage_manager.widget" = {}
"lightspeed.trex.capture_tree.widget" = {}
"lightspeed.trex.home.widget" = {}
"lightspeed.trex.logic.widget" = {}
"lightspeed.trex.sidebar" = {}
"lightspeed.trex.project_setup.widget" = {}
"lightspeed.trex.viewports.shared.widget" = {}
"lightspeed.trex.properties_pane.widget" = {}
"lightspeed.trex.packaging.widget" = {}
"omni.flux.utils.common" = {}
"omni.kit.commands" = {}
"omni.kit.viewport.menubar.lighting" = {}
"omni.kit.window.file" = {}
"omni.ui" = {}

[settings]
# Disable Opacity Micromaps (OMM) for any capture project opened in StageCraft -- before the stage is
# realized -- and re-assert it periodically. A dense game capture's OMM build can overrun the GPU and
# fault/hang it, and prim count does not reliably predict which captures do this. OMM is a render-time
# optimization only: disabling it never changes visuals and never affects editing or asset replacement,
# it just trades a little alpha-tested render performance for stability. Set to false to load captures
# with Opacity Micromaps enabled (full renderer settings).
exts."lightspeed.trex.control.stagecraft".autoDisableOpacityMicromaps = true
# How often (seconds) to re-assert the override while a capture is loaded. Set to 0 to disable the
# periodic re-assert.
exts."lightspeed.trex.control.stagecraft".opacityMicromapReassertIntervalSeconds = 5.0

[[python.module]]
name = "lightspeed.trex.control.stagecraft"

[[test]]
dependencies = [
    "lightspeed.trex.tests.dependencies",
]

args = [
    "--/renderer/mdl/searchPaths/templates=${lightspeed.trex.app.resources}/deps/omni_core_materials/Base;${kit}/mdl/core/Base;${kit}/mdl/core/Volume;${kit}/mdl/core/mdl"
]

stdoutFailPatterns.exclude = [
    "*[omni.kit.scene_view.opengl] No UsdRender.Product was found at '{render_product_path}'*",
    "*[omni.kit.registry.nucleus.utils.common] Skipping deletion of:*",
]

[[test]]
name = "startup"
dependencies = [
    "lightspeed.trex.tests.dependencies",
]

stdoutFailPatterns.exclude = [
    "*[omni.kit.scene_view.opengl] No UsdRender.Product was found at '{render_product_path}'*",
    "*[omni.kit.registry.nucleus.utils.common] Skipping deletion of:*",
]
