[package]
version = "1.0.0"
authors = ["Pierre-Olivier Trottier <ptrottier@nvidia.com>"]
title = "NVIDIA RTX Remix Property Transfer Widget"
description = "Shared RTX Remix UI for transferring authored USD values between replacement layers"
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
keywords = ["remix", "property", "transfer", "layers", "widget"]
icon = "data/icon.png"
category = "internal"
preview_image = "data/preview.png"
repository = "https://gitlab-master.nvidia.com/lightspeedrtx/lightspeed-kit/-/tree/main/source/extensions/lightspeed.trex.property_transfer.widget"

[dependencies]
"lightspeed.layer_manager.core" = {}
"lightspeed.trex.app.style" = {}
"lightspeed.trex.asset_replacements.core.shared" = {}
"omni.flux.layer_tree.usd.widget" = {}
"omni.flux.utils.widget" = {}
"omni.kit.commands" = {}
"omni.ui" = {}
"omni.usd" = {}

[[python.module]]
name = "lightspeed.trex.property_transfer.widget"

[[test]]
dependencies = [
    "lightspeed.trex.tests.dependencies",
]

stdoutFailPatterns.exclude = [
    "*[omni.kit.registry.nucleus.utils.common] Skipping deletion of:*",
]

[[test]]
name = "startup"
dependencies = [
    "lightspeed.trex.tests.dependencies",
]
