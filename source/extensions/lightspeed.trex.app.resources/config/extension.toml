[package]
version = "1.28.7"
authors = ["dbataille@nvidia.com"]
repository = "https://gitlab-master.nvidia.com/lightspeedrtx/lightspeed-kit"
changelog = "docs/CHANGELOG.md"
readme = "docs/README.md"
keywords = ["remix", "app", "ressouces"]
title = "NVIDIA RTX Remix Resources"
description = "This Extension contains resources (images, icons) used by NVIDIA RTX Remix and splash screen."
icon = "data/icon.png"
category = "internal"
preview_image = "data/preview.png"

[dependencies]
# The resources extension provides Packman MDL modules under deps/omni_core_materials.
# Load USD's MDL plugin wherever these resources are loaded; apps/tests provide
# the MDL search path and discovery settings for their own startup mode.
"omni.kit.usd.mdl" = {}

[core]
order = -1000
