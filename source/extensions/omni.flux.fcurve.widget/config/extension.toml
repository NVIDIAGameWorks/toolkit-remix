[package]
version = "1.1.0"
authors = ["Emanuel Kozerski <ekozerski@nvidia.com>"]

title = "Flux FCurve Widget"
description = "A reusable FCurve widget for rendering and editing bezier curves, based on omni.kit.curve_editor"

readme = "docs/README.md"
category = "Widget"
keywords = ["omni", "flux", "fcurve", "curve", "bezier", "animation", "widget"]

changelog = "docs/CHANGELOG.md"
preview_image = "data/images/preview.png"
icon = "data/images/icon.png"

[dependencies]
"omni.flux.utils.common" = {}
"omni.ui" = {}

[[python.module]]
name = "omni.flux.fcurve.widget"

[[test]]
dependencies = [
    "omni.kit.test",
    "omni.kit.ui_test",
]
