[package]
version = "1.2.1"
authors = ["Nicolas Kendall-Bar <nkendallbar@nvidia.com>"]
title = "Omni.UI Scene Sample For Manipulating Select Light"
description = "This example show an 3D manipulator for a selected light"
readme = "docs/README.md"
repository = "https://gitlab-master.nvidia.com/omniverse/kit-extensions/kit-scene"
category = "Documentation"
keywords = ["ui", "example", "scene", "docs", "documentation", "light"]
changelog = "docs/CHANGELOG.md"
preview_image = "data/preview.png"
icon = "data/icon.png"

[dependencies]
"lightspeed.trex.asset_replacements.core.shared" = {}
"lightspeed.trex.contexts" = {}
# Optional: loaded by the app bundle in production (ensures load ordering when present),
# but not auto-enabled in the isolated test process. No Python symbols are imported from
# this package; it is listed here solely for load ordering. Keeping it optional prevents
# its transitive dependency on lightspeed.hydra.remix.core from loading in tests, which
# would trigger a Remix initialization timeout and block the async event loop.
"lightspeed.trex.viewports.manipulators" = { optional = true }
"omni.appwindow" = {}
"omni.flux.utils.common" = {}
"omni.kit.commands" = {}
"omni.kit.scene_view.opengl" = {}
"omni.ui" = {}
"omni.ui.scene" = {}
"omni.usd" = {}

[[python.module]]
name = "lightspeed.ui_scene.light_manipulator"

[settings.persistent.app.viewport.manipulator]
lightManipulatorsVisible = true
lightIntensityControlsVisible = false

[[test]]
args = [
    "--/app/window/dpiScaleOverride=1.0",
    "--/app/window/scaleToMonitor=false",
]
dependencies = [
    "lightspeed.trex.tests.dependencies",
    "omni.kit.widget.viewport"
]

stdoutFailPatterns.exclude = [
    "*[omni.kit.registry.nucleus.utils.common] Skipping deletion of:*",
]

[[test]]
name = "startup"
dependencies = [
    "lightspeed.trex.tests.dependencies",
]
