command = ["build.bat", "repo.bat build"]
description = "Compact lightspeed-kit build output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\repo.bat build {args}"

skip = [
  "^\\s*$",
  "^\\[.*\\] Fetching ",
  "^\\[.*\\] Extracting ",
  "^\\[.*\\] Downloading ",
]

keep = [
  "(?i)^.*\\b(warning|warn|error|failed|failure|fatal|traceback|exception)\\b.*$",
  "(?i)\\bapp ready\\b",
]

on_empty = "error: build output had no warning/error lines and no app ready line"

[on_failure]
output = "{output}"
