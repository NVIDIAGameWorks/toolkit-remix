command = "repo.bat test"
description = "One-line lightspeed-kit Kit test summary"
strip_ansi = true
strip_empty_lines = true
run = ".\\repo.bat test {args}"

skip = [
  "^=+$",
  "^ app:",
  "^\\s*test_id:.*\\bcmd:",
  "^ retry strategy:",
  "^\\s*$",
]

keep = [
  "^\\[\\s*(ok|fail)\\s*\\].*$",
  "^\\[(OK|ERROR)\\].*$",
  "^Failing tests",
  "^\\s+-\\s+",
  "(?i)^\\s*(warning|warn|error|failed|failure|fatal|traceback|exception)\\b.*$",
  "(?i)^.*\\[(warning|warn|error|fail)\\].*$",
]

on_empty = "error: kit test output had no status lines"

[on_failure]
output = "{output}"
