command = "repo.bat test"
description = "One-line lightspeed-kit Kit test summary"
strip_ansi = true
run = ".\\repo.bat test {args}"

skip = [
  "^=+$",
  "^ app:",
  "^\\s*test_id:.*\\bcmd:",
  "^ retry strategy:",
  "^\\s*$",
]

[[section]]
name = "status"
match = "^\\[\\s*(ok|fail)\\s*\\].*$"
collect_as = "status_lines"

[[section]]
name = "failures"
enter = "^Failing tests"
exit = "^=+$"
match = "^\\s+-\\s+"
collect_as = "failure_lines"

[[section]]
name = "result"
match = "^\\[(OK|ERROR)\\].*$"
collect_as = "result_lines"

[on_success]
output = "kit tests: {result_lines | join: \" | \"}; {status_lines | join: \" | \"}"

[on_failure]
output = "kit tests: {result_lines | join: \" | \"}; {status_lines | join: \" | \"}; failures: {failure_lines | join: \"; \"}"

[fallback]
tail = 12
