command = "install_hooks.bat"
description = "Compact lightspeed-kit hook install output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\install_hooks.bat {args}"

skip = [
  "^\\s*$",
]

keep = [
  "(?i)(installing pre-commit hooks|performing clean install|virtual environment (already exists|created)|successfully installed|pre-commit installed|pre-push installed|hooks installed successfully|error|failed|traceback|exception)",
]

on_empty = "error: install_hooks output had no status lines"

[on_failure]
output = "{output}"
