command = ["lint_code.bat", "repo.bat lint"]
description = "Compact lightspeed-kit lint output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\repo.bat lint {args}"

skip = [
  "^\\[repo_lint\\] Selected linters:",
  "^\\[repo_lint\\] list of modified files:",
  "^\\[repo_lint\\] files selected:",
  "^\\[repo_lint\\]\\[ruff\\] running linter",
  "^\\[repo_lint\\]\\[ruff\\] linter output (start|end)",
  "^\\[repo_lint\\]\\[ruff\\] files checked:",
  "^\\[repo_lint\\]\\[ruff\\] executed in",
  "^\\s*$",
]

keep = [
  "^(All checks passed!|[^:]+:\\d+:\\d+:\\s+\\w+\\d+|Found \\d+ errors?|Fixed \\d+ errors?)",
  "(?i)^.*\\b(warning|warn|error|failed|fatal|traceback|exception)\\b.*$",
]

on_empty = "error: lint output had no ruff status lines"

[on_failure]
output = "{output}"
