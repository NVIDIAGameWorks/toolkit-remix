command = [
  "python tools/utils/list_changed_exts.py",
  "python tools/utils/update_pyright_from_settings.py",
  "tools\\packman\\python.bat tools/utils/list_changed_exts.py",
  "tools\\packman\\python.bat tools/utils/update_pyright_from_settings.py"
]
description = "Compact documented lightspeed-kit standalone utility output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true

skip = [
  "^\\s*$",
]

keep = [
  "^\\d+ total extensions changed",
  "^\\d+ need version bumps",
  "^[A-Za-z0-9_-]+(\\.[A-Za-z0-9_-]+)+$",
  "^Wrote pyrightconfig\\.json with \\d+ extraPaths entries\\.",
  "(?i)^.*\\b(warning|warn|error|failed|fatal|traceback|exception)\\b.*$",
]

on_empty = "error: utility output had no status lines"

[on_failure]
output = "{output}"
