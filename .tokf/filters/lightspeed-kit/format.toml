command = ["format_code.bat", "repo.bat format"]
description = "Compact lightspeed-kit format output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\format_code.bat {args}"

skip = [
  "^Using:",
  "^Running:",
  "^Found \\d+ changed Python file",
  "^\\s*$",
]

keep = [
  "^(Would reformat:|\\d+ files? would be reformatted|\\d+ files? already formatted|\\d+ files? reformatted|\\d+ files? left unchanged|All done!)",
  "(?i)(warning|error|failed|traceback|exception)",
]

on_empty = "error: format output had no status lines"

[on_failure]
output = "{output}"
