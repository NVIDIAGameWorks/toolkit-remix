command = "repo.bat *"
description = "Compact default for lightspeed-kit repo.bat subcommands"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\repo.bat {args}"

skip = [
  "^\\s*$",
  "^\\[repo\\] ",
]

keep = [
  "(?i)^.*\\b(warning|warn|error|failed|failure|fatal|traceback|exception|success(?:ful)?|passed|completed|ok)\\b.*$",
]

on_empty = "repo command: no warning/error/success status lines matched"

[on_failure]
output = "{output}"
