command = ["build_docs.bat", "repo.bat docs"]
description = "Compact lightspeed-kit docs build output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\build_docs.bat {args}"

skip = [
  "^\\s*$",
  "^Requirement already satisfied:",
  "^Collecting ",
  "^Using cached ",
]

keep = [
  "(?i)(^.*\\bwarning[:\\]]|^\\s*warning\\b|\\b\\w+warning\\b|\\[Warning\\]|^.*\\b(error|traceback|exception|failed|fatal)\\b)",
  "(?i)build succeeded\\.",
]

on_empty = "error: docs build output had no warning/error lines and no build succeeded line"

[on_failure]
output = "{output}"
