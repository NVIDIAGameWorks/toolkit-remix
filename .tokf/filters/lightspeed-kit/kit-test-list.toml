command = "repo.bat test -l"
description = "One-line lightspeed-kit Kit test bucket count"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\repo.bat test -l {args}"

keep = [
  "Found \\d+ test processes to run\\.",
  "(?i)^\\s*(warning|warn|error|failed|failure|fatal|traceback|exception)\\b.*$",
  "(?i)^.*\\[(warning|warn|error|fail)\\].*$",
]

on_empty = "error: kit test list output had no status lines"

[on_failure]
output = "{output}"
