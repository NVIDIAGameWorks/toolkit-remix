command = "create_venv.bat"
description = "Compact lightspeed-kit venv creation output"
strip_ansi = true
trim_lines = true
strip_empty_lines = true
run = ".\\create_venv.bat {args}"

skip = [
  "^\\s*$",
]

keep = [
  "(?i)virtual environment (already exists|created)",
  "(?i)creating virtual environment",
  "(?i)^.*\\b(error|failed|fatal|traceback|exception)\\b.*$",
]

on_empty = "error: create_venv output had no status lines"

[on_failure]
output = "{output}"
